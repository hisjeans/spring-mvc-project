<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>500 · 서버 오류</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #434343 0%, #b31217 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .error-box {
            background: #fff; border-radius: 16px; padding: 48px 56px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15); text-align: center; max-width: 480px;
            border-top: 6px solid #d64545;   /* 500 = 빨강 계열 */
        }
        .error-icon { font-size: 3rem; margin-bottom: 8px; }
        .error-status { font-size: 3.5rem; font-weight: 700; color: #d64545; line-height: 1; }
        .error-title { font-size: 1.4rem; font-weight: 600; color: #333; margin: 12px 0 8px; }
        .error-message { font-size: 1rem; color: #777; margin-bottom: 28px; line-height: 1.6; }
        .error-link {
            display: inline-block; padding: 12px 24px; background: #d64545; color: #fff;
            text-decoration: none; border-radius: 8px; transition: all 0.2s;
        }
        .error-link:hover { background: #b93636; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="error-box">
        <div class="error-icon">🛠️</div>
        <div class="error-status">500</div>
        <p class="error-title">서버에 문제가 생겼어요</p>
        <!-- 원본 예외 메시지는 보안상 노출하지 않고, 안전한 안내 문구만 (상세는 서버 로그에) -->
        <p class="error-message" th:text="${message}">잠시 후 다시 시도해 주세요.</p>
        <a class="error-link" href="/posts">← 게시글 목록으로</a>
    </div>
</body>
</html>
